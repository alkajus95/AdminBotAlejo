<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminBot - El Cacique del Software</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --gold: #FFD700; 
            --gold-dark: #b8860b;
            --bg: #0a0a0a; 
            --sidebar: #121212; 
            --card-bg: #1a1a1a;
            --text: #e0e0e0;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR ESTILO DINASTÍA --- */
        .sidebar { 
            width: 220px; 
            background: var(--sidebar); 
            border-right: 1px solid #222; 
            display: flex; 
            flex-direction: column; 
            padding: 20px 0;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar-title { 
            color: var(--gold); 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: 900; 
            margin-bottom: 30px; 
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        .nav-item { 
            padding: 15px 25px; 
            color: #888; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            transition: 0.3s;
            font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { 
            background: #1e1e1e; 
            color: var(--gold); 
            border-left: 4px solid var(--gold); 
        }
        .nav-item i { margin-right: 12px; width: 20px; font-size: 1.1rem; }

        /* --- CONTENIDO PRINCIPAL --- */
        .content { flex: 1; overflow-y: auto; padding: 25px; }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        .header h2 { margin: 0; font-family: 'Georgia', serif; font-style: italic; color: var(--gold); }

        .layout { display: grid; grid-template-columns: 1fr 340px; gap: 25px; }

        /* --- GRID DE TARJETAS (Mejorado) --- */
        .student-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 15px; 
        }

        .card { 
            background: linear-gradient(145deg, #1e1e1e, #121212);
            border-radius: 12px; 
            padding: 15px; 
            border: 1px solid #333; 
            border-left: 5px solid var(--gold); 
            position: relative; 
            transition: 0.3s;
            height: 110px; /* Altura compacta horizontal */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card:hover { 
            transform: translateY(-3px);
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
        }

        .card h3 { 
            margin: 0; 
            font-size: 1.05rem; 
            color: var(--gold); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            max-width: 85%;
        }

        .card-info { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.75rem; 
            color: #aaa;
            align-items: flex-end;
        }
        .card-info p { margin: 2px 0; }
        .card-info i { color: var(--gold); margin-right: 5px; width: 12px; }

        .btn-delete { 
            position: absolute; top: 12px; right: 12px; 
            color: #444; cursor: pointer; background: none; border: none; 
            font-size: 1rem; transition: 0.3s;
        }
        .btn-delete:hover { color: #ff4757; transform: rotate(90deg); }

        /* --- PANELES LATERALES --- */
        .panel { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .panel h3 { 
            margin-top: 0; 
            color: var(--gold); 
            font-size: 1rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        /* --- FORMULARIO COMPACTO --- */
        .form-group { margin-bottom: 10px; }
        input, select, button { 
            width: 100%; 
            padding: 10px; 
            margin: 5px 0; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #0d0d0d; 
            color: white; 
            box-sizing: border-box; 
            font-size: 0.85rem;
        }
        input:focus { border-color: var(--gold); outline: none; }
        .btn-submit { 
            background: linear-gradient(to bottom, var(--gold), var(--gold-dark)); 
            color: black; 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
            margin-top: 10px;
            text-transform: uppercase;
        }
        .btn-submit:hover { background: white; transform: scale(1.02); }

        /* --- ESTADOS --- */
        .badge { 
            font-size: 0.6rem; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            display: inline-block;
            margin-bottom: 5px;
        }
        .status-Activo { background: rgba(46, 213, 115, 0.2); color: #2ed573; }
        .status-Pendiente { background: rgba(255, 165, 2, 0.2); color: #ffa502; }
        .status-Negativo { background: rgba(255, 71, 87, 0.2); color: #ff4757; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-title">ADMINBOT</div>
        <a href="#" class="nav-item active"><i class="fa-solid fa-crown"></i> Dashboard</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-users-rays"></i> Alumnos</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-money-bill-gold"></i> Pagos</a>
        <a href="#" class="nav-item" style="margin-top: auto;"><i class="fa-solid fa-record-vinyl"></i> Salir</a>
    </nav>

    <div class="content">
        <div class="header">
            <h2>"Con mucho gusto..."</h2>
            <div id="countSummary" style="font-weight: bold; color: var(--gold); font-size: 0.9rem;"></div>
        </div>

        <div class="layout">
            <div class="student-grid" id="studentsContainer">
                </div>

            <div class="side-col">
                <div class="panel">
                    <h3><i class="fa-solid fa-chart-pie"></i> Estadísticas</h3>
                    <div style="height: 180px;">
                        <canvas id="statsChart"></canvas>
                    </div>
                </div>

                <div class="panel">
                    <h3><i class="fa-solid fa-plus"></i> Nuevo Integrante</h3>
                    <form id="studentForm">
                        <div style="display: flex; gap: 5px;">
                            <select id="document_type" style="width: 75px;">
                                <option value="TI">TI</option>
                                <option value="CC">CC</option>
                                <option value="RC">RC</option>
                            </select>
                            <input type="text" id="document_number" placeholder="N° Documento" required>
                        </div>
                        <input type="text" id="student_code" placeholder="Código Estudiantil" required>
                        <input type="text" id="first_name" placeholder="Nombres" required>
                        <input type="text" id="last_name" placeholder="Apellidos" required>
                        
                        <label style="font-size: 0.65rem; color: #666; margin-left: 5px;">Fecha Nacimiento</label>
                        <input type="date" id="birth_date" required>
                        
                        <select id="status">
                            <option value="Activo">Activo</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="Negativo">Negativo</option>
                        </select>
                        <button type="submit" class="btn-submit">Registrar en la Dinastía</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let chart = null;

        function notify(msg, success = true) {
            Toastify({
                text: msg,
                gravity: "top",
                position: "right",
                style: { 
                    background: success ? "linear-gradient(to right, #b8860b, #FFD700)" : "#ff4757",
                    color: success ? "black" : "white",
                    fontWeight: "bold",
                    borderRadius: "10px"
                }
            }).showToast();
        }

        async function init() {
            renderStudents();
            renderChart();
        }

        async function renderStudents() {
            try {
                const res = await fetch(`${API_URL}/students`);
                const students = await res.json();
                const container = document.getElementById('studentsContainer');
                document.getElementById('countSummary').innerText = `${students.length} Muchachos Registrados`;
                container.innerHTML = '';

                if (students.length === 0) {
                    container.innerHTML = '<p style="color:#444; grid-column: 1/-1; text-align:center;">No hay alumnos registrados aún.</p>';
                    return;
                }

                students.forEach(s => {
                    container.innerHTML += `
                        <div class="card">
                            <button class="btn-delete" onclick="removeStudent('${s.id}')" title="Eliminar">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                            <div>
                                <span class="badge status-${s.status}">${s.status}</span>
                                <h3>${s.first_name} ${s.last_name}</h3>
                            </div>
                            <div class="card-info">
                                <div>
                                    <p><i class="fa-solid fa-id-card"></i> ${s.document_number}</p>
                                    <p><i class="fa-solid fa-fingerprint"></i> ${s.student_code}</p>
                                </div>
                                <div style="text-align: right; opacity: 0.5;">
                                    <p>${s.document_type}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) { console.error(error); }
        }

        async function renderChart() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                const stats = await res.json();
                const ctx = document.getElementById('statsChart').getContext('2d');

                if (chart) chart.destroy();
                chart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: stats.map(s => s.status),
                        datasets: [{
                            data: stats.map(s => s.count),
                            backgroundColor: ['#2ed573', '#ffa502', '#ff4757'],
                            hoverOffset: 10,
                            borderWidth: 0
                        }]
                    },
                    options: { 
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { position: 'bottom', labels: { color: 'white', font: { size: 10 } } } 
                        },
                        cutout: '80%'
                    }
                });
            } catch (err) { console.error(err); }
        }

        async function removeStudent(id) {
            if (!confirm("¿Seguro que quieres remover a este integrante?")) return;
            const res = await fetch(`${API_URL}/students/${id}`, { method: 'DELETE' });
            if (res.ok) {
                notify("Eliminado con éxito");
                init();
            } else {
                const data = await res.json();
                notify("Error: " + data.message, false);
            }
        }

        document.getElementById('studentForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                document_type: document.getElementById('document_type').value,
                document_number: document.getElementById('document_number').value,
                student_code: document.getElementById('student_code').value,
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                birth_date: document.getElementById('birth_date').value,
                status: document.getElementById('status').value
            };

            const res = await fetch(`${API_URL}/students`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                notify("¡Registrado en la Dinastía!");
                e.target.reset();
                init();
            } else {
                notify("Fallo al registrar", false);
            }
        };

        init();
    </script>
</body>
</html>
