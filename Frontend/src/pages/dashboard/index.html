<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminBot - El Cacique del Software</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --gold: #FFD700; 
            --gold-dark: #b8860b;
            --bg: #0a0a0a; 
            --sidebar: #121212; 
            --card-bg: #1a1a1a;
            --text: #e0e0e0;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 220px; 
            background: var(--sidebar); 
            border-right: 1px solid #222; 
            display: flex; 
            flex-direction: column; 
            padding: 20px 0;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        .sidebar-title { 
            color: var(--gold); 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: 900; 
            margin-bottom: 30px; 
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .nav-item { 
            padding: 15px 25px; 
            color: #888; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active { 
            background: #1e1e1e; 
            color: var(--gold); 
            border-left: 4px solid var(--gold); 
        }

        .nav-item i { margin-right: 12px; width: 20px; font-size: 1.1rem; }

        /* --- CONTENIDO --- */
        .content { flex: 1; overflow-y: auto; padding: 25px; }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .header h2 { margin: 0; font-family: 'Georgia', serif; font-style: italic; color: var(--gold); }

        .layout { display: grid; grid-template-columns: 1fr 340px; gap: 25px; }

        /* --- GRID Y TARJETAS --- */
        .student-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 15px; 
        }

        .card { 
            background: linear-gradient(145deg, #1e1e1e, #121212);
            border-radius: 12px; 
            padding: 15px; 
            border: 1px solid #333; 
            border-left: 5px solid var(--gold); 
            position: relative; 
            transition: 0.3s;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover { transform: translateY(-3px); border-color: var(--gold); }

        .card h3 { margin: 0; font-size: 1rem; color: var(--gold); text-overflow: ellipsis; overflow: hidden; }

        .card-actions { display: flex; gap: 8px; margin-top: 10px; }

        .btn-card {
            flex: 1; padding: 7px; font-size: 0.7rem; border-radius: 6px; border: none;
            cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px;
        }

        .btn-wa { background: #25d366; color: white; }
        .btn-guar { background: #333; color: var(--gold); }

        .btn-delete { 
            position: absolute; top: 12px; right: 12px; color: #444; 
            cursor: pointer; background: none; border: none; font-size: 1rem;
        }
        .btn-delete:hover { color: #ff4757; }

        /* --- FORMULARIOS --- */
        .panel { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; }
        .panel h3 { margin-top: 0; color: var(--gold); font-size: 0.9rem; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }

        input, select, button { 
            width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; 
            border: 1px solid #444; background: #0d0d0d; color: white; box-sizing: border-box; font-size: 0.85rem;
        }

        .btn-submit { background: linear-gradient(to bottom, var(--gold), var(--gold-dark)); color: black; font-weight: bold; border: none; cursor: pointer; }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
        }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 15px; width: 360px; border: 1px solid var(--gold); }

        /* --- BADGES --- */
        .badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .status-Activo { background: rgba(46, 213, 115, 0.2); color: #2ed573; }
        .status-Pendiente { background: rgba(255, 165, 2, 0.2); color: #ffa502; }
        .status-Negativo { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-title">ADMINBOT</div>
        <a href="#" class="nav-item active"><i class="fa-solid fa-crown"></i> Dashboard</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-users-rays"></i> Alumnos</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-money-bill-gold"></i> Pagos</a>
        <a href="#" class="nav-item" style="margin-top: auto;"><i class="fa-solid fa-door-open"></i> Salir</a>
    </nav>

    <div class="content">
        <div class="header">
            <h2>"Con mucho gusto..."</h2>
            <div id="countSummary" style="font-weight: bold; color: var(--gold); font-size: 0.9rem;"></div>
        </div>

        <div class="layout">
            <div class="student-grid" id="studentsContainer"></div>

            <div class="side-col">
                <div class="panel">
                    <h3><i class="fa-solid fa-chart-pie"></i> Estado de Cartera</h3>
                    <div style="height: 160px;"><canvas id="statsChart"></canvas></div>
                </div>

                <div class="panel">
                    <h3><i class="fa-solid fa-user-plus"></i> Nuevo Alumno</h3>
                    <form id="studentForm">
                        <div style="display: flex; gap: 5px;">
                            <select id="document_type" style="width: 80px;">
                                <option value="TI">TI</option>
                                <option value="CC">CC</option>
                            </select>
                            <input type="text" id="document_number" placeholder="N° Documento" required>
                        </div>
                        <input type="text" id="student_code" placeholder="Código" required>
                        <input type="text" id="first_name" placeholder="Nombres" required>
                        <input type="text" id="last_name" placeholder="Apellidos" required>
                        <input type="date" id="birth_date" required>
                        <select id="status">
                            <option value="Activo">Activo</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="Negativo">Negativo</option>
                        </select>
                        <button type="submit" class="btn-submit">Añadir a la Dinastía</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="guardianModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold); margin: 0 0 15px 0;">Vincular Acudiente</h3>
            <form id="guardianForm">
                <input type="hidden" id="modal_student_id">
                <input type="text" id="g_first_name" placeholder="Nombre del Acudiente" required>
                <input type="text" id="g_last_name" placeholder="Apellido del Acudiente" required>
                <input type="text" id="g_phone" placeholder="Celular (Ej: 57300...)" required>
                <input type="email" id="g_email" placeholder="Correo electrónico">
                <input type="text" id="g_rel" placeholder="Parentesco (Papá, Mamá, etc.)" required>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button type="submit" class="btn-submit" style="margin:0;">Guardar</button>
                    <button type="button" onclick="closeModal()" style="background:#333; border:none; color:white; cursor:pointer;">Cerrar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let chart = null;

        // --- UTILIDADES ---
        function notify(msg, success = true) {
            Toastify({
                text: msg, gravity: "top", position: "right",
                style: { background: success ? "linear-gradient(to right, #b8860b, #FFD700)" : "#ff4757", color: success ? "black" : "white" }
            }).showToast();
        }

        async function init() {
            await renderStudents();
            await renderChart();
        }

        // --- RENDERIZADO ---
        async function renderStudents() {
            try {
                const res = await fetch(`${API_URL}/students`);
                const students = await res.json();
                const container = document.getElementById('studentsContainer');
                document.getElementById('countSummary').innerText = `${students.length} Muchachos Registrados`;
                container.innerHTML = '';

                students.forEach(s => {
                    container.innerHTML += `
                        <div class="card">
                            <button class="btn-delete" onclick="removeStudent('${s.id}')"><i class="fa-solid fa-xmark"></i></button>
                            <div>
                                <span class="badge status-${s.status}">${s.status}</span>
                                <h3>${s.first_name} ${s.last_name}</h3>
                                <p style="font-size:0.7rem; color:#666; margin:4px 0;">ID: ${s.document_number}</p>
                            </div>
                            <div class="card-actions">
                                <button class="btn-card btn-wa" onclick="markAbsence('${s.id}')">
                                    <i class="fa-brands fa-whatsapp"></i> FALTÓ
                                </button>
                                <button class="btn-card btn-guar" onclick="openModal('${s.id}')">
                                    <i class="fa-solid fa-user-shield"></i> ACUDIENTE
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) { console.error("Error cargando alumnos:", e); }
        }

        async function renderChart() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                const stats = await res.json();
                const ctx = document.getElementById('statsChart').getContext('2d');
                
                if (chart) chart.destroy();
                chart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: stats.map(s => s.status),
                        datasets: [{
                            data: stats.map(s => s.count),
                            backgroundColor: ['#2ed573', '#ffa502', '#ff4757'],
                            borderWidth: 0
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' }
                });
            } catch (e) { console.error("Error cargando gráfico:", e); }
        }

        // --- ACCIONES ---
        async function markAbsence(id) {
            if (!confirm("¿Deseas reportar la inasistencia por WhatsApp?")) return;
            try {
                const res = await fetch(`${API_URL}/asistencia`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: id, status: 'Ausente', observation: 'Reportado desde el Dashboard' })
                });
                if (res.ok) notify("Notificación enviada con éxito");
                else notify("El alumno no tiene acudiente vinculado", false);
            } catch (e) { notify("Error de conexión", false); }
        }

        async function removeStudent(id) {
            if (!confirm("¿Eliminar alumno de la base de datos?")) return;
            const res = await fetch(`${API_URL}/students/${id}`, { method: 'DELETE' });
            if (res.ok) { notify("Alumno eliminado"); init(); }
        }

        // --- FORMULARIOS Y MODAL ---
        function openModal(id) {
    console.log("Abriendo modal para estudiante ID:", id); // Verifica esto en la consola del navegador (F12)
    document.getElementById('modal_student_id').value = id;
    document.getElementById('guardianModal').style.display = 'flex';
}

        function closeModal() { document.getElementById('guardianModal').style.display = 'none'; }

        document.getElementById('studentForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                document_type: document.getElementById('document_type').value,
                document_number: document.getElementById('document_number').value,
                student_code: document.getElementById('student_code').value,
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                birth_date: document.getElementById('birth_date').value,
                status: document.getElementById('status').value
            };
            const res = await fetch(`${API_URL}/students`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) { notify("¡Alumno registrado!"); e.target.reset(); init(); }
        };

        // Busca este bloque al final de tu script en el index.html
document.getElementById('guardianForm').onsubmit = async (e) => {
    e.preventDefault();
    
    // 1. Recolectamos los datos del modal
    const data = {
        student_id: document.getElementById('modal_student_id').value,
        first_name: document.getElementById('g_first_name').value,
        last_name: document.getElementById('g_last_name').value,
        phone: document.getElementById('g_phone').value,
        email: document.getElementById('g_email').value,
        relationship: document.getElementById('g_rel').value
    };

    try {
        // 2. Hacemos el envío al backend
        const res = await fetch(`${API_URL}/acudientes`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
            // Si todo sale bien
            notify("¡Acudiente vinculado con éxito!");
            closeModal();
            e.target.reset();
            init(); // Esto refresca la lista y el gráfico
        } else {
            // 3. SI HAY ERROR: Aquí es donde verás el chisme real de la DB
            // Si el backend envía 'sqlError', lo mostramos en el notify
            notify(result.sqlError || result.message || "Error al vincular", false);
            console.error("Error detallado del servidor:", result);
        }
    } catch (err) {
        notify("No hay conexión con el servidor", false);
        console.error("Error de red:", err);
    }
};

        init();
    </script>
</body>
</html>
