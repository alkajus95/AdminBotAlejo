<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminBot - Gestión de Usuarios</title>
    <link rel="stylesheet" href="../../shared/css/main.css">
    <link rel="stylesheet" href="style.css">
    
    <script type="module" src="../../shared/js/auth-guard.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="glass-ultimate p-4 flex justify-between items-center shadow-xl mb-8">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold tracking-tighter uppercase">AdminBot</h1>
            <a href="../dashboard/index.html" class="text-sm opacity-70 hover:opacity-100 transition">Dashboard</a>
        </div>
        <button id="logout-btn" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 px-4 py-2 rounded-lg text-xs font-bold transition">
            CERRAR SESIÓN
        </button>
    </nav>

    <main class="container mx-auto px-4">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-extrabold">Gestión de Usuarios</h2>
                <p class="text-gray-400 text-sm">Administra el acceso del personal al sistema.</p>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <div class="relative flex-1 md:w-64">
                    <input type="text" id="search-input" 
                           placeholder="Buscar por correo o ID..." 
                           class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 transition">
                </div>
                <button id="btn-open-modal" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg transition">
                    + Nuevo Usuario
                </button>
            </div>
        </header>

        <div class="glass-ultimate overflow-hidden rounded-2xl shadow-2xl border border-white/5">
            <table class="w-full text-left border-collapse">
                <thead class="bg-white/5 text-gray-400 uppercase text-xs font-bold">
                    <tr>
                        <th class="p-4 border-b border-white/5">ID</th>
                        <th class="p-4 border-b border-white/5">Nombres</th>
                        <th class="p-4 border-b border-white/5">Correo</th>
                        <th class="p-4 border-b border-white/5 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="usuarios-table-body" class="divide-y divide-white/5">
                    <tr>
                        <td colspan="4" class="p-8 text-center text-gray-500 italic">
                            Cargando usuarios...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="user-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 w-full max-w-md rounded-2xl p-6 border border-white/10 shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-4">Nuevo Usuario</h3>
            
            <form id="form-usuario" class="space-y-4">
                <input type="hidden" id="user-id">
                
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">Nombres</label>
                    <input type="text" id="reg-nombres" required 
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:border-blue-500 outline-none">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">Apellidos</label>
                    <input type="text" id="reg-apellidos" required 
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:border-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">Correo Electrónico</label>
                    <input type="email" id="reg-correo" required 
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:border-blue-500 outline-none">
                </div>

                <div id="password-field">
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">Contraseña</label>
                    <input type="password" id="reg-pass" 
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:border-blue-500 outline-none">
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" id="btn-close-modal" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg text-sm font-bold transition">
                        Cancelar
                    </button>
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-sm font-bold transition">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./usuarios.js"></script>
</body>
</html>
